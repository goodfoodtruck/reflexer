name: Deploy (dev)

on:
  push:
    branches:
      - develop

# Évite deux déploiements dev concurrents : un nouveau push annule le précédent.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository }}-server
  WEB_IMAGE: ghcr.io/${{ github.repository }}-web

jobs:
  # 1. On rejoue les tests avant tout déploiement.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  # 2. Build des images Docker et push sur GHCR (tags `dev` + sha).
  build-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write # nécessaire pour pousser sur GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workspaces/apis/server/Dockerfile.prod
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:dev
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workspaces/apps/game/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL_DEV }}
          tags: |
            ${{ env.WEB_IMAGE }}:dev
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev

  # 3. Déploiement sur le VPS via SSH (projet docker isolé `reflexer-dev`).
  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Copie le compose de dev sur le VPS (dossier ~/reflexer).
      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: docker-compose.dev.yml
          target: reflexer

      # Pull des nouvelles images puis recréation des conteneurs dev.
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd reflexer
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_TAG="${IMAGE_TAG}"
            docker compose -p reflexer-dev -f docker-compose.dev.yml pull
            docker compose -p reflexer-dev -f docker-compose.dev.yml up -d --remove-orphans
            docker logout ghcr.io
            docker image prune -f
