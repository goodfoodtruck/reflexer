services:

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: reflexer
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongodb:27017"
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

  server:
    build:
      context: .
      dockerfile: workspaces/apis/server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      MONGODB_URI: "mongodb://mongodb:27017/reflexer"
      PORT: "4000"
    depends_on:
      - mongodb
    command: ["pnpm", "dev"]

volumes:
  mongo_data: