server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # API : tout /api/* est relayé vers le server (réseau interne docker, non
    # exposé). Le slash final sur proxy_pass retire le préfixe /api :
    #   navigateur /api/users  ->  server /users
    location /api/ {
        proxy_pass http://server:4000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA : on sert index.html pour toutes les routes (react-router gère ensuite).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
